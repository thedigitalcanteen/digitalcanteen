<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Manager Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/js/all.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --primary-gold: #d4b454;
            --primary-gold-hover: #c4a444;
            --bg-light: #f8f9fa;
            --text-dark: #1a1a2e;
            --text-muted: #6c757d;
            --sidebar-width: 260px;
            --border-color: #eef0f2;
            --active-green-bg: #e6f4ea;
            --active-green-text: #34a853;
            --blocked-bg: #f1f3f4;
            --blocked-text: #5f6368;
            --action-dark: #344767;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* Sidebar */
        aside {
            width: var(--sidebar-width);
            background-color: #fff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: fixed;
            height: 100%;
            z-index: 100;
        }

        .logo-container {
            padding: 0 30px 40px 30px;
            text-align: center;
        }

        .logo-icon {
            font-size: 40px;
            color: var(--primary-gold);
            margin-bottom: 10px;
            display: block;
        }

        .logo-text {
            font-weight: 800;
            font-size: 18px;
            color: var(--primary-gold);
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            margin-bottom: 5px;
            padding: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            padding: 12px 20px;
            display: block;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        nav ul li a.active {
            background-color: var(--primary-gold);
            color: #fff;
        }

        nav ul li a:hover:not(.active) {
            background-color: #f0f0f0;
            color: var(--text-dark);
        }

        /* Main Content */
        main {
            margin-left: var(--sidebar-width);
            flex: 1;
            /* padding: 40px 50px; */
            padding-bottom: 100px; /* Space for footer */
        }
        .topbarset .icon-btn {
            display: none;
            width: 37px;
            height: 37px;
        }
        .search-container .fa-magnifying-glass {
            color: black;
            position: absolute;
            align-self: center;
            left: 13px;
        }
        .header-info{margin: 20px;}
        .topheader .header-info{margin: 0 !important;}
        .topheader{margin: 20px;}
        
        main .card{margin: 20px;}
        .icon-btn {
            background: white;
            color: #333333;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        /* Header */
        header {
            background-color: #333333;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border-radius: 8px;
            border: none;
            background-color: white;
            font-size: 14px;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #d4af37;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .date-time {
            text-align: right;
            font-size: 13px;
        }

        .date-time .time {
            font-weight: 600;
            display: block;
        }

        .date-time .date {
            color: #d4af37;
        }
        .header-info{margin-bottom: 40px;}

        .header-info h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .header-info p {
            color: var(--text-muted);
            font-size: 14px;
            max-width: 500px;
            line-height: 1.5;
        }

        .btn-add {
            background-color: var(--primary-gold);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(212, 180, 84, 0.3);
            transition: background 0.3s;
        }

        .btn-add:hover {
            background-color: var(--primary-gold-hover);
        }

        /* Table Card */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .card-header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        .filter-status {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-dropdown {
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #fff;
        }

        th {
            text-align: left;
            padding: 15px 30px;
            font-size: 11px;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 20px 30px;
            font-size: 14px;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-color);
        }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }

        .user-info .name {
            font-weight: 700;
            display: block;
            color: var(--text-dark);
        }

        .user-info .id {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .school-cell, .canteen-cell, .contact-cell {
            color: #4a5568;
            font-weight: 500;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-active {
            background-color: var(--active-green-bg);
            color: var(--active-green-text);
        }

        .status-blocked {
            background-color: var(--blocked-bg);
            color: var(--blocked-text);
        }

        .actions-cell {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .btn-action:hover {
            opacity: 0.9;
        }

        .btn-edit {
            background-color: #fff8e6;
            color: var(--primary-gold);
        }

        .btn-block {
            background-color: #f8f9fa;
            color: var(--action-dark);
            border: 1px solid var(--border-color);
        }

        .btn-unblock {
            background-color: var(--primary-gold);
            color: #fff;
        }

        /* Pagination */
        .pagination-container {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination-info {
            font-size: 11px;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
        }

        .pagination-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .page-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            background: #fff;
        }

        .page-btn.active {
            background-color: var(--primary-gold);
            color: #fff;
            border-color: var(--primary-gold);
        }

        .page-dots {
            color: #a0aec0;
            padding: 0 5px;
        }

        /* Footer */
        footer {
            background-color: #1a1a2e;
            color: #fff;
            padding: 20px 50px;
            left: 0;
            text-align: right;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 50;
            font-size: 13px;
            font-weight: 400;
        }

        footer span {
            opacity: 0.7;
        }

        .mobile-menu-btn{display: none;}

        @media (max-width: 992px) {
            .menusearchbar {
                margin-bottom: 10px !important;
            }
            .tabs {
                padding-bottom: 2px;
            }
            .dashboard-container {
                padding: 20px 20px;
            }
            header{
                padding: 15px 20px;
                display: block;
                place-items: center;
            }
            .search-bar {
                width: 80%;
                margin-bottom: 10px;
            }
            .header-right {
                justify-content: center;
                width: 100%;
            }
            .welcome-section{
                text-align: center;
                display: block;
            }
            .welcome-text{text-align: center;margin-bottom: 10px;}
            .top-actions {
                justify-self: center;
                display: block;
            }
            .top-actions button {width: 100%;margin-bottom: 10px;}
            .stats-grid{
                display: block;
            }
            .stat-card{
                margin-bottom: 10px;
            }
            .section-header{
                display: block;
            }
            .children-grid{display: block;}
            .child-card{
                margin-bottom: 10px;
            }
            .dashboard-layout{display: block;}
            .page-header{
                display: block;
            }
            .action-btns{display: block;}
            .btn-outline{margin-bottom: 10px;}
            .stats-grid{display: block;}
            .stat-card{margin-bottom: 10px;}
            .tabs-filters{display: block;}
            .tabs{display: block;}
            .flex {
                display: block !important;
            }
            .ActionBtnTabs {
                display: grid;
            }
            .tab-btn {
                margin-bottom: 3px;
            }
            .w-80{width:100% !important}
            .summary-cards{display: block;}
            .card-order{margin-bottom: 10px;}
            .pricing-grid{
                display: block;
            }
            .pricing-card{margin-bottom: 10px;}
            .bottom-row{display: block;}
            .bottom-row .pricing-card{width: 100% !important;}
            .btn{width: 100%;}
            .transaction-header{display: block;}
            .recent-order-grid{display: block !important;}
            .tabs{display: block !important;}
            .category-section .tab.active{margin: 0 !important;}
            .menusearchbar{float: none !important;}
            .category-icons{display: block !important;}
            .category-item{width: 100% !important;}
            .menu-grid{display: block !important;}
            .main-layout{display: block;margin-left: auto !important;}
            .container{padding: 20px !important;}
            .alertcard-header{display: block !important;}
            .setting-item{display: block !important;}
            .alertcard{display: block !important;}
            .alertcard div{display: block !important;}
            .filters{display: block !important;}
            .filters button{width: 100%;}
            .calendar-header{display: block !important;}
            .calendar-legend{display: block !important;}
            .calendar-grid{display: block !important;}

            aside {
            transform: translateX(-100%);
            height: 100% !important;
            }

            aside.active {
                transform: translateX(0);
                width: 100%;
            }
            .mobile-menu-open{overflow: hidden;}

            .logo-icon img {
                display: none;
            }
            .logo-icon{margin-bottom: 50px;}
            .logo-container {
                padding: 0 20px 20px !important;
            }
            nav ul li a{padding: 10px !important;}

            /* Floating mobile menu button */
            .mobile-menu-btn {
                position: fixed;
                left: 15px;
                top: 15px;
                z-index: 1001;
                font-size: 12px;
                background: #fff;
                border: 1px solid #ccc;
                border-radius: 5px;
                padding: 16px 4px !important;
                cursor: pointer;
                display: block !important;
            }

            /* Overlay effect */
            main.mobile-menu-open::after {
                content: '';
                position: fixed;
                left: 0; top: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 998;
            }
            main{margin-left: 0 !important;}
            .transactions-section{overflow: auto;}
            .search-bar{justify-self: right;}
            body{display: block !important;}
            header{
                position: sticky;
                top: 0;
                z-index: 99;
            }
            header {
                padding: 15px 20px;
                display: block;
                place-items: center;
                height: auto !important;
            }
            .topbarset .icon-btn {
                display: flex !important;
                position: absolute;
                right: 15px;
            }
            .topbarset {
                display: flex;
                justify-content: center;
                width: 100%;
            }
            .search-container {
                margin-left: 26px;
                justify-self: right;
                width: 80% !important;
                float: right;
                margin-bottom: 15px;
            }
            .search-container input {
                width: 90%;
            }
            .content-area{margin: 20px;}
            .tableresponsive .tableborder tr, th, td{white-space: nowrap;}
            .content-wrapper{padding: 20px;}
            .btn-add{margin-top: 10px;}
            .header-section h1 {
                font-size: 23px !important;
            }
            .content-area{padding: 0 !important;}
            .content-wrapper{padding: 20px !important;}
            .menu-card{margin-bottom: 10px;}
            footer{text-align:center !important;}
            .page-title{font-size:23px !important;}
            
        }

         @media (min-width: 992px) and (max-width: 1300px) {
            .category-item {width: auto !important;}
            .menu-grid{
                grid-template-columns: repeat(2, 1fr) !important;
            }
            .recent-order-grid{
                grid-template-columns: repeat(3, 1fr) !important;
            }
            .category-item {
                width: 60px !important;
            }
         }

        @media (max-width: 650px) {

}

}
