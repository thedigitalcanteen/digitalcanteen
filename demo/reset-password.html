<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - The Digital Canteen</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/js/all.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333333;
        }

        .logo-container {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }



        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333333;
        }

        .subtitle {
            font-size: 14px;
            color: #757575;
            margin-bottom: 40px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            position: absolute;
            top: -10px;
            left: 12px;
            background-color: #ffffff;
            padding: 0 5px;
            font-size: 12px;
            color: #333333;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
            color: #333333;
            outline: none;
        }

        .input-group input:focus {
            border-color: #d4b663;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666666;
            cursor: pointer;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #d4b663;
            cursor: pointer;
            border: 1px solid #333;
            border-radius: 2px;
        }

        .forgot-password {
            color: #f88c8c;
            text-decoration: none;
            font-weight: 500;
        }

        .login-button {
            width: 100%;
            padding: 15px;
            background-color: #d4b663;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }

        .login-button:hover {
            background-color: #c4a552;
        }

        .footer-text {
            font-size: 13px;
            color: #333333;
        }

        .footer-text a {
            color: #f88c8c;
            text-decoration: none;
            font-weight: 600;
        }

        /* Logo recreation with CSS/Icons */
        .custom-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
        }


        .custom-logo img {
            width: 129px;
            height: 140px;
            object-fit: contain;
            display: block;
        }

        .custom-logo a {
            display: inline-block;
        }

        select {
        width: 100%;
        padding: 15px;
        border: 1px solid #cccccc;
        border-radius: 4px;
        font-size: 14px;
        color: #333333;
        outline: none;
        }


        @media (max-width: 600px) {
            .logo-container {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 40px;
            }
            body {
                justify-content: flex-start;
                padding-top: 60px;
            }
        }
    </style>


<!-- Final logo size lock: keeps the high-resolution logo visually the same size as the original. -->
<style>
.logo-icon img[src$="canteen_logo.png"],
.logo-top img[src$="canteen_logo.png"],
.custom-logo img[src$="canteen_logo.png"] {
    width: 129px !important;
    height: 140px !important;
    max-width: 129px !important;
    max-height: 140px !important;
    object-fit: contain !important;
}
.logo-container .custom-logo img[src$="logo.png"],
.custom-logo .logo-top img[src$="logo.png"] {
    width: 129px !important;
    height: 140px !important;
    max-width: 129px !important;
    max-height: 140px !important;
    object-fit: contain !important;
}
.logo-icon a,
.logo-top a,
.custom-logo a {
    display: inline-block;
}
</style>

</head>
<body>

    <div class="logo-container">
        <div class="custom-logo">
            <div class="logo-top">
                <a href="index.html" aria-label="Back to dashboard demo">
                    <img src="Parents/images/logo.png" alt="The Digital Canteen Logo">
                </a>
            </div>

        </div>
    </div>

    <main class="login-container">
        <h1>Reset Password</h1>
        <p class="subtitle">Please enter your unique ID and password to start your shift.</p>

        <form id="resetPasswordForm">
            <div class="input-group">
                <label for="username">Parent user name</label>
                <input type="text" id="username" value="john.doe@gmail.com">
            </div>

            <div class="input-group">
                <label for="password">Old Password</label>
                <input type="password" id="old_password" value="password1234567890">
                <span class="password-toggle">
                    <i class="fa-solid fa-eye-slash"></i>
                </span>
            </div>

            <div class="input-group">
                <label for="password">New Password</label>
                <input type="password" id="new_password" value="password1234567890">
                <span class="password-toggle">
                    <i class="fa-solid fa-eye-slash"></i>
                </span>
            </div>

            <div class="input-group">
                <label for="password">Confirm Password</label>
                <input type="password" id="confirm_password" value="password1234567890">
                <span class="password-toggle">
                    <i class="fa-solid fa-eye-slash"></i>
                </span>
            </div>

            <button type="submit" class="login-button">Reset Password</button>

            <p class="footer-text">
                Remember your password?  <a href="login.html">Login</a>
            </p>
        </form>
    </main>

    <script>
        // Simple script to handle password visibility toggle
        document.querySelectorAll('.password-toggle').forEach(function(toggle){

            toggle.addEventListener('click', function(){

                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('i');

                if(input.type === "password"){
                    input.type = "text";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                } 
                else{
                    input.type = "password";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                }

            });

        });
    </script>
    <script>
   document.getElementById("resetPasswordForm").addEventListener("submit", function(e){

    e.preventDefault();

    let username = document.getElementById("username").value.trim().toLowerCase();
    let oldpass = document.getElementById("old_password").value.trim();
    let newpass = document.getElementById("new_password").value.trim();
    let confpass = document.getElementById("confirm_password").value.trim();

    if(newpass !== confpass)
    {
        alert("New password and confirm password do not match");
        return;
    }

    let parentPass = localStorage.getItem("parentPass") || "parents";
    let studentPass = localStorage.getItem("studentPass") || "students";
    let kitchenPass = localStorage.getItem("kitchenPass") || "kitchen";
    let adminPass = localStorage.getItem("adminPass") || "admin";

    if(username === "parents@gmail.com" && oldpass === parentPass)
    {
        localStorage.setItem("parentPass", newpass);
        alert("Password updated successfully");
        window.location.href="login.html";
    }
    else if(username === "students@gmail.com" && oldpass === studentPass)
    {
        localStorage.setItem("studentPass", newpass);
        alert("Password updated successfully");
        window.location.href="login.html";
    }
    else if(username === "kitchen@gmail.com" && oldpass === kitchenPass)
    {
        localStorage.setItem("kitchenPass", newpass);
        alert("Password updated successfully");
        window.location.href="login.html";
    }
    else if(username === "admin@gmail.com" && oldpass === adminPass)
    {
        localStorage.setItem("adminPass", newpass);
        alert("Password updated successfully");
        window.location.href="login.html";
    }
    else
    {
        alert("Old password incorrect!");
    }

});
    </script>


</body>
</html>
