<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Digital Canteen</title>
<meta name="description" content="The Digital Canteen — Reimagining the school canteen. From the UAE, for UAE schools.">
<style>
  :root {
    --cream: #FAF5E8;
    --cream-deep: #F4ECD5;
    --gold: #C9A348;
    --gold-deep: #A88533;
    --gold-soft: #F0E2B6;
    --dark: #1F1F1F;
    --ink: #2B2B2B;
    --muted: #6B6B6B;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Decorative background circles */
  .bg-circle {
    position: fixed;
    border-radius: 50%;
    background: var(--gold-soft);
    z-index: 0;
  }
  .bg-circle-1 { width: 420px; height: 420px; top: -140px; right: -120px; opacity: 0.45; }
  .bg-circle-2 { width: 360px; height: 360px; bottom: -120px; left: -110px; opacity: 0.5; }
  .bg-dot {
    position: fixed;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    z-index: 0;
  }
  .bg-dot-1 { top: 18%; left: 14%; opacity: 0.5; }
  .bg-dot-2 { bottom: 16%; right: 16%; opacity: 0.6; }

  /* Faint dot grid texture */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(var(--gold) 1.1px, transparent 1.1px);
    background-size: 48px 48px;
    opacity: 0.06;
    z-index: 0;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 230px;
    max-width: 60vw;
    height: auto;
    margin-bottom: 8px;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    animation-delay: 0.05s;
  }

  /* Divider with center dot */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0 34px;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    animation-delay: 0.15s;
  }
  .divider .line { width: 46px; height: 2px; background: var(--gold); }
  .divider .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

  .buttons {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 20px 24px;
    border-radius: 16px;
    font-family: Georgia, serif;
    font-size: 19px;
    font-weight: bold;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .btn svg { width: 24px; height: 24px; flex-shrink: 0; margin-right: 4px; }

  /* Primary: Website (dark) */
  .btn-website {
    background: var(--dark);
    color: var(--gold);
    border: 2px solid var(--dark);
    box-shadow: 0 6px 18px rgba(31,31,31,0.18);
    animation-delay: 0.25s;
  }
  .btn-website svg { stroke: var(--gold); }
  .btn-website:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 26px rgba(31,31,31,0.26);
  }
  .btn-website:active { transform: translateY(-1px); }

  /* Secondary: Instagram (gold outline) */
  .btn-instagram {
    background: var(--white);
    color: var(--dark);
    border: 2px solid var(--gold);
    box-shadow: 0 6px 18px rgba(201,163,72,0.14);
    animation-delay: 0.35s;
  }
  .btn-instagram svg { stroke: var(--gold-deep); }
  .btn-instagram:hover {
    transform: translateY(-3px);
    background: var(--gold-soft);
    box-shadow: 0 12px 26px rgba(201,163,72,0.24);
  }
  .btn-instagram:active { transform: translateY(-1px); }

  .footer {
    margin-top: 38px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    animation-delay: 0.45s;
  }

  @media (max-width: 380px) {
    .btn { font-size: 17px; padding: 18px 20px; }
    .logo { width: 200px; }
  }
</style>
</head>
<body>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-dot bg-dot-1"></div>
  <div class="bg-dot bg-dot-2"></div>

  <main class="card">/assets/images/logo-original.png" 
    <img class="logo" src= "C:\Users\xx3bo\Downloads\logo-original_1.png" alt="The Digital Canteen logo">

    <div class="divider">
      <span class="line"></span>
      <span class="dot"></span>
      <span class="line"></span>
    </div>

    <nav class="buttons">
      <a class="btn btn-website" href="https://www.thedigitalcanteen.ae/site">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>

      <a class="btn btn-instagram" href="https://www.instagram.com/thedigitalcanteen" target="_blank" rel="noopener">

</body>
</html>
